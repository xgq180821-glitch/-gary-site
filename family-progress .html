<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭进步表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f3ed;
  --card: #fffdf9;
  --text: #2c2416;
  --text2: #4a3f30;
  --accent: #b8860b;
  --accent2: #8b6508;
  --muted: #8a7b65;
  --light: #b8a88e;
  --lighter: #d4c8b4;
  --border: #e6ddd0;
  --border2: #ddd3c3;
  --track: #f0ebe2;
  --serif: 'Noto Serif SC', 'Songti SC', Georgia, serif;
  --display: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
  --sans: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --c0: #d4764e; --c1: #6b8e5a; --c2: #5478a0; --c3: #b07bab; --c4: #c9943e;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--lighter);border-radius:4px}
input::placeholder,textarea::placeholder{color:var(--lighter)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

#app{min-height:100vh;position:relative}

/* Header */
.header{position:sticky;top:0;z-index:200;background:rgba(247,243,237,0.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.header-inner{display:flex;justify-content:space-between;align-items:center;padding:12px 24px;max-width:1200px;margin:0 auto}
.logo{font-family:var(--display);font-size:24px;color:var(--accent2);letter-spacing:2px}
.logo small{font-size:12px;color:var(--light);font-family:var(--sans);letter-spacing:0;margin-left:8px;font-weight:400}
.header-right{display:flex;gap:10px;align-items:center}
.btn{border:none;border-radius:10px;padding:8px 16px;font-size:13px;cursor:pointer;font-family:var(--sans);font-weight:500;transition:all 0.2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:none;border:1px solid var(--border2);color:var(--muted)}.btn-ghost:hover{background:var(--track)}
.btn-back{background:none;border:none;font-size:15px;color:var(--muted);cursor:pointer;font-family:var(--sans)}
.btn-icon{background:none;border:1px solid var(--border2);border-radius:10px;padding:7px 12px;font-size:16px;cursor:pointer;transition:all 0.2s}
.btn-icon:hover{background:var(--track)}

.main{padding:20px 24px 60px;max-width:1200px;margin:0 auto}

/* ─── Table View ─── */
.table-header-bar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.table-title{font-family:var(--display);font-size:20px;color:var(--accent2)}
.table-subtitle{font-size:13px;color:var(--light);margin-top:2px}
.stat-pills{display:flex;gap:16px}
.stat-pill{text-align:center}
.stat-pill .num{font-size:20px;font-weight:700;font-family:var(--serif);color:var(--accent)}
.stat-pill .lbl{font-size:11px;color:var(--light)}

.table-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--border);background:var(--card);animation:fadeIn 0.4s ease}
.progress-table{width:100%;border-collapse:collapse;min-width:750px}

.progress-table thead th{background:var(--accent);color:#fff;padding:0;font-weight:600;font-size:13px;border:none;text-align:center}
.progress-table thead th:first-child{background:var(--accent2);text-align:center;min-width:110px;position:sticky;left:0;z-index:12}
.th-inner{padding:12px 10px}
.th-member{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 8px}
.th-avatar{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;border:2px solid rgba(255,255,255,0.4)}
.th-name{font-size:13px;font-weight:600;line-height:1.2}
.th-nick{font-size:11px;opacity:0.8;font-weight:400}

.progress-table tbody tr{transition:background 0.15s}
.progress-table tbody tr:hover{background:rgba(184,134,11,0.03)}
.progress-table tbody tr:nth-child(even){background:rgba(240,235,226,0.3)}
.progress-table tbody tr:nth-child(even):hover{background:rgba(184,134,11,0.05)}

.progress-table td{padding:0;border-bottom:1px solid var(--border);vertical-align:top;font-size:13px;line-height:1.7;color:var(--text2)}

.td-week{position:sticky;left:0;z-index:5;background:var(--card);border-right:2px solid var(--border);min-width:110px;font-family:var(--serif);text-align:center;vertical-align:middle}
.progress-table tbody tr:nth-child(even) .td-week{background:#faf7f1}
.td-week-inner{padding:12px 10px;display:flex;flex-direction:column;align-items:center;gap:2px}
.td-week-num{font-size:15px;font-weight:700;color:var(--accent)}
.td-week-range{font-size:10px;color:var(--light);line-height:1.3}
.td-week-year{font-size:10px;color:var(--lighter)}
.td-week-actions{display:flex;gap:4px;margin-top:6px}
.td-week-actions button{background:none;border:none;font-size:13px;cursor:pointer;padding:2px 4px;border-radius:4px;transition:background 0.15s}
.td-week-actions button:hover{background:var(--track)}
.backfill-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9px;background:#fff3e0;color:#e65100;font-weight:500;margin-top:3px;font-family:var(--sans)}

.td-content{padding:10px 14px;border-right:1px solid var(--track);min-width:130px;white-space:pre-wrap;word-break:break-word}
.td-content:last-child{border-right:none}
.td-empty{color:var(--lighter);font-style:italic;font-size:12px}

/* ─── Edit View ─── */
.edit-container{max-width:780px;margin:0 auto;animation:fadeIn 0.35s ease}
.edit-header{margin-bottom:24px}
.edit-title{font-family:var(--display);font-size:22px;color:var(--accent2);margin-bottom:4px}
.edit-subtitle{font-size:13px;color:var(--light)}
.week-picker{display:flex;gap:10px;align-items:center;margin-bottom:24px;flex-wrap:wrap}
.week-picker label{font-size:13px;font-weight:600;color:var(--muted)}
.week-select{padding:10px 14px;border-radius:10px;border:1px solid var(--border2);font-size:14px;font-family:var(--sans);background:var(--card);color:var(--text);outline:none;cursor:pointer}
.week-select:focus{border-color:var(--accent)}
.btn-this-week{padding:8px 14px;border-radius:10px;border:1px solid var(--border2);background:var(--card);font-size:13px;cursor:pointer;font-family:var(--sans);color:var(--accent);transition:all 0.2s}
.btn-this-week.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.edit-block{background:var(--card);border-radius:14px;border:1px solid var(--border);margin-bottom:16px;overflow:hidden;animation:slideUp 0.35s ease both}
.edit-block-head{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--track)}
.edit-block-head .member-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.edit-block-head .name{font-size:15px;font-weight:600;color:var(--text);font-family:var(--serif)}
.edit-block-head .nick{font-size:12px;color:var(--light);margin-left:4px;font-family:var(--sans)}
.edit-block-head .char-count{margin-left:auto;font-size:12px;color:var(--lighter)}
.edit-textarea{width:100%;padding:14px 18px;border:none;outline:none;font-size:14px;font-family:var(--sans);color:var(--text);line-height:1.8;resize:vertical;min-height:100px;background:transparent}
.edit-textarea:focus{background:rgba(184,134,11,0.02)}

.save-bar{position:sticky;bottom:0;background:rgba(247,243,237,0.95);backdrop-filter:blur(12px);padding:14px 0;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.save-bar .hint{font-size:13px;color:var(--light)}
.save-bar .hint strong{color:var(--accent);font-weight:600}
.btn-save{padding:12px 32px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all 0.2s}
.btn-save:hover{background:var(--accent2)}

/* ─── Report View ─── */
.report-container{max-width:780px;margin:0 auto;animation:fadeIn 0.4s ease}
.report-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:28px 24px;margin-bottom:20px}
.report-week-title{font-family:var(--display);font-size:22px;color:var(--accent2);text-align:center;margin-bottom:4px}
.report-subtitle{text-align:center;font-size:13px;color:var(--light);margin-bottom:24px}
.report-member{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--track)}
.report-member:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.report-member-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.report-member-head .member-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff}
.report-member-head .rname{font-family:var(--serif);font-size:17px;font-weight:600}
.report-member-head .rnick{color:var(--light);font-size:13px;margin-left:6px}
.report-text{font-size:15px;line-height:1.85;color:var(--text2);white-space:pre-wrap;padding-left:52px}
.report-empty{font-size:14px;color:var(--lighter);padding-left:52px;font-style:italic}

/* ─── Stats ─── */
.stats-container{max-width:780px;margin:0 auto;animation:fadeIn 0.35s ease}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:14px;padding:18px;text-align:center;border:1px solid var(--border)}
.stat-card .sc-icon{font-size:24px;margin-bottom:6px}
.stat-card .sc-value{font-size:26px;font-weight:700;font-family:var(--serif);color:var(--accent)}
.stat-card .sc-label{font-size:12px;color:var(--light);margin-top:2px}
.chart-card{background:var(--card);border-radius:14px;padding:18px;border:1px solid var(--border);margin-bottom:16px}
.chart-title{font-size:15px;font-weight:600;color:var(--accent2);margin-bottom:14px;font-family:var(--serif)}
.member-bar{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.member-bar .bar-label{font-size:13px;width:80px;flex-shrink:0;display:flex;align-items:center;gap:6px}
.member-bar .bar-label .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.member-bar .bar-track{flex:1;height:14px;background:var(--track);border-radius:7px;overflow:hidden}
.member-bar .bar-fill{height:100%;border-radius:7px;transition:width 0.6s ease}
.member-bar .bar-count{font-size:12px;color:var(--muted);width:55px;text-align:right}
.completion-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;text-align:center}
.completion-item .c-avatar{width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;margin-bottom:6px}
.completion-item .c-pct{font-size:18px;font-weight:700;font-family:var(--serif);color:var(--accent)}
.completion-item .c-name{font-size:11px;color:var(--light)}

.empty-state{text-align:center;padding:60px 20px;animation:fadeIn 0.4s}
.empty-state .icon{font-size:52px;margin-bottom:16px}
.empty-state p{color:var(--muted);font-size:15px;margin-bottom:16px}

@media(max-width:600px){
  .header-inner,.main{padding-left:14px;padding-right:14px}
  .stats-grid{grid-template-columns:1fr}
  .completion-grid{grid-template-columns:repeat(3,1fr);gap:14px}
  .report-text,.report-empty{padding-left:0;margin-top:8px}
}
</style>
</head>

const STORAGE_KEY = 'family_progress_v2';

function getCurrentWeek() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const dayOfYear = Math.floor((d - jan1) / 86400000) + 1;
  const weekNum = Math.ceil((dayOfYear + jan1.getDay()) / 7);
  return d.getFullYear() + '-W' + String(weekNum).padStart(2, '0');
}
function parseWeek(wk) { const p = wk.split('-W'); return { year: +p[0], week: +p[1] }; }
function weekDisplay(wk) { return '第' + parseWeek(wk).week + '周'; }
function weekFullDisplay(wk) { const p = parseWeek(wk); return p.year + '年 第' + p.week + '周'; }
function weekStartDate(wk) {
  const { year, week } = parseWeek(wk);
  const jan1 = new Date(year, 0, 1);
  const s = new Date(year, 0, 1 + (week-1)*7 - jan1.getDay() + 1);
  return (s.getMonth()+1) + '/' + s.getDate();
}
function weekEndDate(wk) {
  const { year, week } = parseWeek(wk);
  const jan1 = new Date(year, 0, 1);
  const e = new Date(year, 0, 1 + (week-1)*7 - jan1.getDay() + 7);
  return (e.getMonth()+1) + '/' + e.getDate();
}
function weekRange(wk) { return weekStartDate(wk) + ' ~ ' + weekEndDate(wk); }
function getSortedWeeks() { return Object.keys(weeks).sort((a, b) => b.localeCompare(a)); }
function generateWeekOptions() {
  const cur = getCurrentWeek();
  const { year, week } = parseWeek(cur);
  const opts = [];
  for (let i = 0; i < 24; i++) {
    let w = week - i, y = year;
    if (w < 1) { y--; w += 52; }
    opts.push(y + '-W' + String(w).padStart(2, '0'));
  }
  return opts;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function getStats() {
  const allWeeks = getSortedWeeks(), totalWeeks = allWeeks.length;
  const memberWords = {}, memberWeeks = {};
  MEMBERS.forEach(m => { memberWords[m.id] = 0; memberWeeks[m.id] = 0; });
  allWeeks.forEach(wk => { const data = weeks[wk]; MEMBERS.forEach(m => { const t = (data[m.id]||'').trim(); if(t){memberWords[m.id]+=t.length;memberWeeks[m.id]++;} }); });
  return { totalWeeks, memberWords, memberWeeks, totalWords: Object.values(memberWords).reduce((a,b)=>a+b,0) };
}

function render() {
  const app = document.getElementById('app');
  let html = '<header class="header"><div class="header-inner">';
  if (currentView !== 'home') html += '<button class="btn-back" onclick="goHome()">← 返回主页</button>';
  else html += '<div class="logo">家庭进步表<small>每周记录 · 共同成长</small></div>';
  html += '<div class="header-right">';
  if (currentView === 'home') {
    html += '<button class="btn-icon" onclick="goStats()" title="统计">📊</button>';
    html += '<button class="btn btn-primary" onclick="goEdit()">✏️ 写周记</button>';
  }
  html += '</div></div></header><main class="main">';
  if (currentView === 'home') html += renderHome();
  else if (currentView === 'edit') html += renderEdit();
  else if (currentView === 'report') html += renderReport();
  else if (currentView === 'stats') html += renderStats();
  html += '</main>';
  app.innerHTML = html;
  if (currentView === 'edit') {
    MEMBERS.forEach(m => { const ta = document.getElementById('ta-'+m.id); if(ta) ta.value = (weeks[editWeek]||{})[m.id]||''; });
  }
}

function renderHome() {
  const sorted = getSortedWeeks(), stats = getStats();
  let h = '<div class="table-header-bar"><div><div class="table-title">成长记录总览</div><div class="table-subtitle">所有家庭成员的每周进步，一表尽览</div></div>';
  h += '<div class="stat-pills"><div class="stat-pill"><div class="num">'+stats.totalWeeks+'</div><div class="lbl">周</div></div>';
  h += '<div class="stat-pill"><div class="num">'+stats.totalWords+'</div><div class="lbl">总字数</div></div></div></div>';

  if (!sorted.length) {
    return h + '<div class="empty-state"><div class="icon">🌱</div><p>还没有记录，开始写第一篇家庭周记吧</p><button class="btn btn-primary" onclick="goEdit()">✏️ 开始记录</button></div>';
  }

  h += '<div class="table-wrap"><table class="progress-table"><thead><tr>';
  h += '<th><div class="th-inner">📅 周次</div></th>';
  MEMBERS.forEach(m => {
    h += '<th><div class="th-member"><div class="th-avatar" style="background:'+m.color+'">'+m.initial+'</div><div class="th-name">'+m.name+'</div><div class="th-nick">'+m.nick+'</div></div></th>';
  });
  h += '</tr></thead><tbody>';

  sorted.forEach(wk => {
    const data = weeks[wk];
    h += '<tr><td class="td-week"><div class="td-week-inner">';
    h += '<div class="td-week-num">'+weekDisplay(wk)+'</div>';
    h += '<div class="td-week-range">'+weekRange(wk)+'</div>';
    h += '<div class="td-week-year">'+parseWeek(wk).year+'</div>';
    if (data.backfill) h += '<div class="backfill-tag">补录</div>';
    h += '<div class="td-week-actions"><button onclick="goEditWeek(\''+wk+'\')" title="编辑">✏️</button><button onclick="goReport(\''+wk+'\')" title="周报">📋</button><button onclick="handleDeleteWeek(\''+wk+'\')" title="删除" style="color:#c44">🗑</button></div>';
    h += '</div></td>';
    MEMBERS.forEach(m => {
      const txt = (data[m.id]||'').trim();
      h += '<td class="td-content">'+(txt ? esc(txt) : '<span class="td-empty">暂未记录</span>')+'</td>';
    });
    h += '</tr>';
  });

  h += '</tbody></table></div>';
  return h;
}

function renderEdit() {
  const curWeek = getCurrentWeek(), isBackfill = editWeek !== curWeek, data = weeks[editWeek] || {}, opts = generateWeekOptions();
  let h = '<div class="edit-container"><div class="edit-header"><div class="edit-title">'+(isBackfill?'📅 补录周记':'✏️ 本周记录')+'</div><div class="edit-subtitle">在一个页面记录所有家人的进步</div></div>';
  h += '<div class="week-picker"><label>选择周：</label><select class="week-select" onchange="editWeek=this.value;render()">';
  opts.forEach(wk => {
    h += '<option value="'+wk+'"'+(wk===editWeek?' selected':'')+'>'+weekFullDisplay(wk)+' ('+weekRange(wk)+')'+(wk===curWeek?' ← 本周':'')+(weeks[wk]?' ✓':'')+'</option>';
  });
  h += '</select><button class="btn-this-week '+(editWeek===curWeek?'active':'')+'" onclick="editWeek=getCurrentWeek();render()">本周</button></div>';

  MEMBERS.forEach((m, i) => {
    const txt = data[m.id] || '';
    h += '<div class="edit-block" style="animation-delay:'+i*0.05+'s"><div class="edit-block-head">';
    h += '<div class="member-avatar" style="background:'+m.color+'">'+m.initial+'</div>';
    h += '<span class="name">'+m.name+'<span class="nick">'+m.nick+'</span></span>';
    h += '<span class="char-count" id="cc-'+m.id+'">'+txt.length+' 字</span></div>';
    h += '<textarea class="edit-textarea" id="ta-'+m.id+'" placeholder="记录'+m.nick+'这周的进步..." oninput="document.getElementById(\'cc-'+m.id+'\').textContent=this.value.length+\' 字\'"></textarea></div>';
  });

  const filled = MEMBERS.filter(m=>(data[m.id]||'').trim()).length;
  const hasExisting = !!weeks[editWeek];
  h += '<div class="save-bar"><div class="hint">已填 <strong>'+filled+'/5</strong> 人'+(isBackfill?' · 补录模式':'')+'</div><div style="display:flex;gap:10px">';
  if (hasExisting) h += '<button style="padding:12px 16px;border-radius:12px;border:1px solid #f0d0d0;background:#fdf5f5;color:#c44;font-size:14px;cursor:pointer;font-family:var(--sans)" onclick="handleDeleteWeek(\''+editWeek+'\')">🗑 删除本周</button>';
  h += '<button class="btn-save" onclick="handleSave()">💾 保存记录</button></div></div></div>';
  return h;
}

function renderReport() {
  if (!reportWeek || !weeks[reportWeek]) return '<div class="report-container"><div class="empty-state"><p>没有找到这周的记录</p></div></div>';
  const data = weeks[reportWeek], filled = MEMBERS.filter(m=>(data[m.id]||'').trim()).length;
  let h = '<div class="report-container"><div class="report-card"><div class="report-week-title">📋 '+weekFullDisplay(reportWeek)+'</div>';
  h += '<div class="report-subtitle">'+weekRange(reportWeek)+' · '+filled+'/5 人已记录'+(data.backfill?' · 补录':'')+'</div>';
  MEMBERS.forEach(m => {
    const txt = (data[m.id]||'').trim();
    h += '<div class="report-member"><div class="report-member-head"><div class="member-avatar" style="background:'+m.color+'">'+m.initial+'</div><span class="rname">'+m.name+'</span><span class="rnick">'+m.nick+'</span></div>';
    h += (txt ? '<div class="report-text">'+esc(txt)+'</div>' : '<div class="report-empty">本周暂未记录</div>') + '</div>';
  });
  h += '</div><div style="display:flex;justify-content:center;gap:12px"><button class="btn btn-ghost" onclick="goEditWeek(\''+reportWeek+'\')">✏️ 编辑</button></div></div>';
  return h;
}

function renderStats() {
  const stats = getStats(), mxW = Math.max(...Object.values(stats.memberWords),1), mxWk = Math.max(...Object.values(stats.memberWeeks),1);
  let h = '<div class="stats-container"><div class="edit-header"><div class="edit-title">📊 统计分析</div><div class="edit-subtitle">家庭成长数据一览</div></div>';
  h += '<div class="stats-grid">';
  h += '<div class="stat-card"><div class="sc-icon">📅</div><div class="sc-value">'+stats.totalWeeks+'</div><div class="sc-label">已记录周数</div></div>';
  h += '<div class="stat-card"><div class="sc-icon">✍️</div><div class="sc-value">'+stats.totalWords+'</div><div class="sc-label">总字数</div></div>';
  h += '<div class="stat-card"><div class="sc-icon">👨‍👩‍👧‍👦</div><div class="sc-value">5</div><div class="sc-label">家庭成员</div></div>';
  h += '<div class="stat-card"><div class="sc-icon">📝</div><div class="sc-value">'+(stats.totalWeeks?Math.round(stats.totalWords/stats.totalWeeks):0)+'</div><div class="sc-label">每周平均字数</div></div></div>';

  h += '<div class="chart-card"><h3 class="chart-title">记录完成率</h3><div class="completion-grid">';
  MEMBERS.forEach(m => {
    const pct = stats.totalWeeks ? Math.round(stats.memberWeeks[m.id]/stats.totalWeeks*100) : 0;
    h += '<div class="completion-item"><div class="c-avatar" style="background:'+m.color+'">'+m.initial+'</div><div class="c-pct">'+pct+'%</div><div class="c-name">'+m.nick+'</div></div>';
  });
  h += '</div></div>';

  h += '<div class="chart-card"><h3 class="chart-title">累计字数</h3>';
  MEMBERS.forEach(m => { const w=stats.memberWords[m.id]; h+='<div class="member-bar"><div class="bar-label"><span class="dot" style="background:'+m.color+'"></span>'+m.nick+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(w/mxW*100).toFixed(0)+'%;background:'+m.color+'"></div></div><span class="bar-count">'+w+' 字</span></div>'; });
  h += '</div>';

  h += '<div class="chart-card"><h3 class="chart-title">参与周数</h3>';
  MEMBERS.forEach(m => { const w=stats.memberWeeks[m.id]; h+='<div class="member-bar"><div class="bar-label"><span class="dot" style="background:'+m.color+'"></span>'+m.nick+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(w/mxWk*100).toFixed(0)+'%;background:'+m.color+'"></div></div><span class="bar-count">'+w+' 周</span></div>'; });
  h += '</div></div>';
  return h;
}

function goHome(){currentView='home';render();window.scrollTo(0,0)}
function goEdit(){editWeek=getCurrentWeek();currentView='edit';render();window.scrollTo(0,0)}
function goEditWeek(wk){editWeek=wk;currentView='edit';render();window.scrollTo(0,0)}
function goReport(wk){reportWeek=wk;currentView='report';render();window.scrollTo(0,0)}
function goStats(){currentView='stats';render();window.scrollTo(0,0)}

function handleSave() {
  const curWeek = getCurrentWeek(), isBackfill = editWeek !== curWeek;
  const data = weeks[editWeek] || {};
  MEMBERS.forEach(m => { const ta = document.getElementById('ta-'+m.id); if(ta) data[m.id] = ta.value; });
  data.updatedAt = new Date().toISOString();
  if (isBackfill && !weeks[editWeek]) data.backfill = true;
  weeks[editWeek] = data;
  save();
  currentView = 'home'; render(); window.scrollTo(0,0);
  showToast('✅ 保存成功');
}

function handleDeleteWeek(wk) {
  if (!weeks[wk]) return;
  if (!confirm('确定要删除「' + weekFullDisplay(wk) + '」的所有记录吗？此操作不可恢复。')) return;
  delete weeks[wk];
  save();
  if (currentView === 'edit' && editWeek === wk) currentView = 'home';
  render(); window.scrollTo(0,0);
  showToast('🗑 已删除');
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.textContent = msg;
  toast.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 24px;border-radius:10px;font-size:14px;z-index:999;animation:fadeIn 0.3s ease;font-family:var(--sans)';
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(), 1800);
}

load(); render();
</script>
