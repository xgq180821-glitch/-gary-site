<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的工具箱</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: #0a0a12;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    max-width: 600px;
    width: 100%;
    padding: 40px 24px;
  }
  h1 {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 8px;
    color: rgba(255,255,255,0.9);
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 40px;
    letter-spacing: 2px;
  }
  .card {
    display: block;
    text-decoration: none;
    padding: 24px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    margin-bottom: 14px;
    transition: all 0.3s;
    cursor: pointer;
  }
  .card:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(0,220,180,0.3);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }
  .card-title {
    font-size: 17px;
    font-weight: 500;
    color: rgba(0,220,180,0.9);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-icon {
    font-size: 22px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    background: rgba(0,220,180,0.08);
    flex-shrink: 0;
  }
  .card-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    line-height: 1.5;
    margin-left: 46px;
  }
  .card-arrow {
    float: right;
    color: rgba(255,255,255,0.15);
    font-size: 20px;
    margin-top: -36px;
    transition: all 0.3s;
  }
  .card:hover .card-arrow {
    color: rgba(0,220,180,0.5);
    transform: translateX(4px);
  }
  .footer {
    text-align: center;
    margin-top: 40px;
    font-size: 11px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 1px;
  }

  @media (max-width: 500px) {
    .container { padding: 28px 16px; }
    h1 { font-size: 22px; }
    .card { padding: 18px; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>我的工具箱</h1>
  <p class="subtitle">Creative Tools Collection</p>

  <!-- 
    ⬇️ 修改说明：
    把下面每个 href="xxx.html" 改成你仓库里实际的文件名
    想加新工具就复制一个 <a class="card"> 块，改名字和链接即可
  -->
  
 <a class="card" href="family-progress.html">
    <div class="card-title">
      <div class="card-icon">◎</div>
      家庭进步日记
    </div>
    <div class="card-desc">记录家庭成员的进步脚步</div>
    <div class="card-arrow">→</div>
  </a>
  
   <a class="card" href="journal.html">
    <div class="card-title">
      <div class="card-icon">◎</div>
      每日一记
    </div>
    <div class="card-desc">讲述每日发生的事情</div>
    <div class="card-arrow">→</div>
  </a>
  
  <a class="card" href="3d-shuttle-share.html">
    <div class="card-title">
      <div class="card-icon">◎</div>
      3D 纵深穿梭
    </div>
    <div class="card-desc">四种模式 · 可调速度和色调 · 手机电脑都能玩</div>
    <div class="card-arrow">→</div>
  </a>

<a class="card" href="parallax-generator.html">
  <div class="card-title">
    <div class="card-icon">❋</div>
    3D 视差穿梭生成器
  </div>
  <div class="card-desc">上传多张图片 · 自动生成 Mental Canvas 风格纵深动画</div>
  <div class="card-arrow">→</div>
</a>

  <a class="card" href="image-splitter.html">
    <div class="card-title">
      <div class="card-icon">⊞</div>
      图片切割工具
    </div>
    <div class="card-desc">网格或自由切割 · 一键下载所有切片</div>
    <div class="card-arrow">→</div>
  </a>

  <!--
    以后做了新工具，复制下面这个模板添加即可：

  <a class="card" href="新文件名.html">
    <div class="card-title">
      <div class="card-icon">★</div>
      工具名称
    </div>
    <div class="card-desc">工具简介</div>
    <div class="card-arrow">→</div>
  </a>
  -->

  <div class="footer">Powered by GitHub Pages</div>
</div>

</body>
</html>
