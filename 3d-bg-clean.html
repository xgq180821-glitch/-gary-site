<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Background</title>
<style>
* { margin: 0; padding: 0; }
body { background: #000; overflow: hidden; cursor: none; }
canvas { display: block; position: fixed; top: 0; left: 0; }
.hint {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.25);
  font: 12px sans-serif;
  letter-spacing: 2px;
  pointer-events: none;
  z-index: 10;
  transition: opacity 3s;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint" id="hint">按 1-4 切换模式 · 滚轮调速 · 按 H 隐藏提示</div>
<script>
const cv = document.getElementById('c');
const c = cv.getContext('2d');
let W, H, cx, cy, time = 0, speed = 3, mode = 'tunnel';

function resize() {
  W = cv.width = window.innerWidth;
  H = cv.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

document.addEventListener('keydown', e => {
  if (e.key === '1') mode = 'tunnel';
  if (e.key === '2') mode = 'warp';
  if (e.key === '3') mode = 'helix';
  if (e.key === '4') mode = 'grid';
  if (e.key === 'h' || e.key === 'H') document.getElementById('hint').style.opacity = '0';
});
document.addEventListener('wheel', e => {
  speed = Math.max(0.5, Math.min(8, speed + e.deltaY * 0.003));
});

// ===== TUNNEL =====
class Ring {
  constructor(z) {
    this.z = z; this.seg = 22; this.rot = Math.random() * 6.28;
    this.holes = Array.from({length: this.seg}, () => Math.random() > 0.3);
    this.rVar = 0.8 + Math.random() * 0.4;
  }
  update(dt) {
    this.z -= speed * 90 * dt;
    this.rot += dt * 0.35 * (speed / 3);
    if (this.z < 5) {
      this.z = 1400;
      this.holes = Array.from({length: this.seg}, () => Math.random() > 0.3);
      this.rVar = 0.8 + Math.random() * 0.4;
    }
  }
  draw() {
    if (this.z < 5) return;
    const s = 350 / this.z, r = 250 * s * this.rVar;
    const alpha = Math.min(1, 1 - this.z / 1400) * 0.9;
    for (let i = 0; i < this.seg; i++) {
      if (!this.holes[i]) continue;
      const a1 = (i / this.seg) * 6.28 + this.rot;
      const a2 = ((i + 1) / this.seg) * 6.28 + this.rot;
      const h = (170 + this.z * 0.05 + time * 25) % 360;
      c.strokeStyle = `hsla(${h},80%,55%,${alpha})`;
      c.lineWidth = Math.max(0.5, 3 * s);
      c.shadowColor = `hsla(${h},80%,55%,${alpha * 0.4})`;
      c.shadowBlur = 8 * s;
      c.beginPath();
      c.moveTo(cx + Math.cos(a1) * r, cy + Math.sin(a1) * r);
      c.lineTo(cx + Math.cos(a2) * r, cy + Math.sin(a2) * r);
      c.stroke();
    }
    c.shadowBlur = 0;
  }
}

// ===== WARP =====
class Star {
  constructor() { this.reset(); }
  reset() {
    const a = Math.random() * 6.28, d = 20 + Math.random() * 280;
    this.x = Math.cos(a) * d; this.y = Math.sin(a) * d;
    this.z = 800 + Math.random() * 1200; this.pz = this.z;
    this.b = 0.4 + Math.random() * 0.6;
  }
  update(dt) {
    this.pz = this.z;
    this.z -= speed * 180 * dt;
    if (this.z < 1) this.reset();
  }
  draw() {
    const sx = cx + (this.x / this.z) * 600, sy = cy + (this.y / this.z) * 600;
    const px = cx + (this.x / this.pz) * 600, py = cy + (this.y / this.pz) * 600;
    const a = Math.min(1, 1 - this.z / 2000) * this.b;
    const sz = Math.max(0.4, (1 - this.z / 2000) * 3.5);
    const h = (190 + this.z * 0.04 + time * 35) % 360;
    c.strokeStyle = `hsla(${h},70%,65%,${a * 0.9})`;
    c.lineWidth = sz * 0.7;
    c.beginPath(); c.moveTo(px, py); c.lineTo(sx, sy); c.stroke();
    c.shadowColor = `hsla(${h},70%,80%,${a * 0.5})`;
    c.shadowBlur = 6;
    c.fillStyle = `hsla(${h},50%,90%,${a})`;
    c.beginPath(); c.arc(sx, sy, sz, 0, 6.28); c.fill();
    c.shadowBlur = 0;
  }
}

// ===== HELIX =====
class HelixP {
  constructor(z) {
    this.z = z; this.a = Math.random() * 6.28;
    this.r = 80 + Math.random() * 140;
    this.strand = Math.random() > 0.5 ? 1 : -1;
    this.sz = 1 + Math.random() * 3;
  }
  update(dt) {
    this.z -= speed * 75 * dt;
    this.a += dt * 2.8 * (speed / 3) * this.strand;
    if (this.z < 5) { this.z = 1300; this.a = Math.random() * 6.28; }
  }
  draw() {
    if (this.z < 5) return;
    const s = 350 / this.z;
    const x = cx + Math.cos(this.a) * this.r * s;
    const y = cy + Math.sin(this.a) * this.r * s;
    const a = Math.min(1, 1 - this.z / 1300) * 0.85;
    const h = (this.strand > 0 ? 165 : 285) + time * 22;
    c.shadowColor = `hsla(${h % 360},80%,60%,${a * 0.3})`;
    c.shadowBlur = 5;
    c.fillStyle = `hsla(${h % 360},80%,58%,${a})`;
    c.beginPath(); c.arc(x, y, this.sz * s, 0, 6.28); c.fill();

    // trail
    for (let t = 1; t <= 3; t++) {
      const ta = this.a - 0.2 * t * this.strand;
      const tx = cx + Math.cos(ta) * this.r * s;
      const ty = cy + Math.sin(ta) * this.r * s;
      c.fillStyle = `hsla(${h % 360},80%,58%,${a * (0.25 - t * 0.06)})`;
      c.beginPath(); c.arc(tx, ty, this.sz * s * (1 - t * 0.15), 0, 6.28); c.fill();
    }
    c.shadowBlur = 0;
  }
}

// ===== GRID =====
class GLine {
  constructor(z, horiz) {
    this.z = z; this.h = horiz;
    this.off = (Math.random() - 0.5) * 700;
  }
  update(dt) {
    this.z -= speed * 75 * dt;
    if (this.z < 5) { this.z = 1600; this.off = (Math.random() - 0.5) * 700; }
  }
  draw() {
    if (this.z < 5) return;
    const s = 350 / this.z;
    const a = Math.min(1, 1 - this.z / 1600) * 0.65;
    const h = (155 + this.z * 0.05 + time * 18) % 360;
    c.strokeStyle = `hsla(${h},70%,55%,${a})`;
    c.lineWidth = Math.max(0.3, 1.8 * s);
    c.beginPath();
    if (this.h) { const y = cy + this.off * s; c.moveTo(0, y); c.lineTo(W, y); }
    else { const x = cx + this.off * s; c.moveTo(x, 0); c.lineTo(x, H); }
    c.stroke();

    // intersection node
    if (Math.random() < 0.008 * speed) {
      const nx = this.h ? cx + (Math.random() - 0.5) * W * 0.6 : cx + this.off * s;
      const ny = this.h ? cy + this.off * s : cy + (Math.random() - 0.5) * H * 0.6;
      c.shadowColor = `hsla(${h},90%,70%,0.6)`;
      c.shadowBlur = 10;
      c.fillStyle = `hsla(${h},90%,70%,${a * 0.9})`;
      c.beginPath(); c.arc(nx, ny, 2.5 * s, 0, 6.28); c.fill();
      c.shadowBlur = 0;
    }
  }
}

// ===== DUST (all modes) =====
class Dust {
  constructor() {
    this.x = (Math.random() - 0.5) * 3500;
    this.y = (Math.random() - 0.5) * 3500;
    this.z = Math.random() * 1600;
    this.sz = 0.2 + Math.random() * 0.6;
  }
  update(dt) {
    this.z -= speed * 55 * dt;
    if (this.z < 1) { this.z = 1600; this.x = (Math.random() - 0.5) * 3500; this.y = (Math.random() - 0.5) * 3500; }
  }
  draw() {
    const s = 250 / this.z;
    const sx = cx + this.x * s, sy = cy + this.y * s;
    if (sx < -10 || sx > W + 10 || sy < -10 || sy > H + 10) return;
    const a = (1 - this.z / 1600) * 0.25;
    c.fillStyle = `rgba(150,200,255,${a})`;
    c.beginPath(); c.arc(sx, sy, this.sz * s, 0, 6.28); c.fill();
  }
}

// INIT
const rings = Array.from({length: 55}, (_, i) => new Ring(i * 26));
const stars = Array.from({length: 400}, () => new Star());
const helixes = Array.from({length: 250}, () => new HelixP(Math.random() * 1300));
const glines = [
  ...Array.from({length: 30}, (_, i) => new GLine(i * 55, true)),
  ...Array.from({length: 30}, (_, i) => new GLine(i * 55, false))
];
const dusts = Array.from({length: 150}, () => new Dust());

let last = performance.now();

function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  time += dt;

  // motion blur
  c.fillStyle = `rgba(6,6,14,${0.14 + 0.06 / (speed / 3)})`;
  c.fillRect(0, 0, W, H);

  // center glow
  const g = c.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W, H) * 0.45);
  g.addColorStop(0, `rgba(0,25,45,${0.05 * (speed / 3)})`);
  g.addColorStop(1, 'transparent');
  c.fillStyle = g; c.fillRect(0, 0, W, H);

  switch (mode) {
    case 'tunnel': rings.forEach(r => { r.update(dt); r.draw(); }); break;
    case 'warp': stars.forEach(s => { s.update(dt); s.draw(); }); break;
    case 'helix': helixes.forEach(h => { h.update(dt); h.draw(); }); break;
    case 'grid': glines.forEach(l => { l.update(dt); l.draw(); }); break;
  }
  dusts.forEach(d => { d.update(dt); d.draw(); });

  // subtle vignette
  const v = c.createRadialGradient(cx, cy, Math.min(W, H) * 0.3, cx, cy, Math.max(W, H) * 0.7);
  v.addColorStop(0, 'transparent');
  v.addColorStop(1, 'rgba(0,0,0,0.4)');
  c.fillStyle = v; c.fillRect(0, 0, W, H);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// 3秒后淡出提示
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 5000);
</script>
</body>
</html>
